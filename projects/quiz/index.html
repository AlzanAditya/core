<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Lab - Zanxa Studio</title>
  <meta name="description" content="Web quiz interaktif dengan timer, skor, review jawaban, dan pilihan kategori.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../../favicon.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app-shell">
    <section class="quiz-panel" aria-live="polite">
      <header class="app-header">
        <a class="brand" href="../" aria-label="Kembali ke daftar proyek">
          <img src="../../assets/icon/zanxa-transparent.png" alt="">
          <span>Quiz Lab</span>
        </a>
        <div class="header-stats" aria-label="Statistik quiz">
          <span id="best-score">Best: 0</span>
          <span id="question-total">0 soal</span>
        </div>
      </header>

      <section id="start-screen" class="screen screen-active">
        <div class="intro-grid">
          <div class="intro-copy">
            <h1>Quiz cepat buat ngetes fokus.</h1>
            <p>Pilih arena, jawab sebelum waktu habis, lalu cek review jawabanmu di akhir.</p>
          </div>
          <div class="score-plate" aria-hidden="true">
            <span class="plate-number">10</span>
            <span class="plate-label">soal singkat</span>
          </div>
        </div>

        <div class="mode-list" role="radiogroup" aria-label="Pilih kategori quiz">
          <button class="mode-card selected" type="button" data-mode="mix" role="radio" aria-checked="true">
            <span class="mode-icon">Mix</span>
            <strong>Campuran</strong>
            <small>Logika, web, dan pengetahuan umum.</small>
          </button>
          <button class="mode-card" type="button" data-mode="web" role="radio" aria-checked="false">
            <span class="mode-icon">Web</span>
            <strong>Web Dasar</strong>
            <small>HTML, CSS, JavaScript, dan aksesibilitas.</small>
          </button>
          <button class="mode-card" type="button" data-mode="logic" role="radio" aria-checked="false">
            <span class="mode-icon">Log</span>
            <strong>Logika</strong>
            <small>Pola, hitungan ringan, dan nalar cepat.</small>
          </button>
        </div>

        <button id="start-btn" class="primary-btn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5v14l11-7-11-7Z" />
          </svg>
          Mulai Quiz
        </button>
      </section>

      <section id="quiz-screen" class="screen">
        <div class="quiz-top">
          <div>
            <p class="micro-label" id="current-mode">Campuran</p>
            <h2 id="question-title">Pertanyaan</h2>
          </div>
          <div class="timer" aria-label="Sisa waktu">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 6v6l4 2M12 22a9 9 0 1 0 0-18 9 9 0 0 0 0 18ZM9 2h6" />
            </svg>
            <span id="timer-text">60</span>
          </div>
        </div>

        <div class="progress-track" aria-hidden="true">
          <span id="progress-fill"></span>
        </div>

        <div id="answer-list" class="answer-list"></div>

        <footer class="quiz-footer">
          <div class="live-score">
            <span>Skor</span>
            <strong id="live-score">0</strong>
          </div>
          <button id="next-btn" class="secondary-btn" type="button" disabled>
            Lanjut
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h14m-6-6 6 6-6 6" />
            </svg>
          </button>
        </footer>
      </section>

      <section id="result-screen" class="screen">
        <div class="result-card">
          <p class="micro-label">Hasil akhir</p>
          <h2 id="result-title">Mantap.</h2>
          <div class="result-score">
            <span id="final-score">0</span>
            <small>/ 100</small>
          </div>
          <p id="result-message">Review jawabanmu sudah siap.</p>
        </div>

        <div id="review-list" class="review-list"></div>

        <div class="result-actions">
          <button id="retry-btn" class="primary-btn" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 12a8 8 0 0 1 13.66-5.66L20 8M20 4v4h-4M20 12a8 8 0 0 1-13.66 5.66L4 16M4 20v-4h4" />
            </svg>
            Main Lagi
          </button>
          <button id="home-btn" class="secondary-btn" type="button">Pilih Paket</button>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
